<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trade | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='modern.css') }}?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-robot"></i> AI<span>Trade</span>
            </div>

            <nav class="nav-menu">
                <a href="/" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="/portfolio" class="nav-item active"><i class="fa-solid fa-briefcase"></i> Portfolio</a>
                <a href="/news" class="nav-item"><i class="fa-solid fa-newspaper"></i> News</a>
                <a href="/settings" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>

            <div class="system-status-box">
                <div class="status-ver">v1.2.0</div>
                <div class="uptime">
                    <span class="dot"></span> <span id="uptime-display">Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1>Your Portfolio</h1>
                    <span class="subtitle">Track your holdings and performance</span>
                </div>
                <div class="actions">
                    <button class="btn-primary" id="add-holding-btn"><i class="fa-solid fa-plus"></i> Add
                        Holding</button>
                </div>
            </header>

            <!-- Portfolio Summary -->
            <div class="portfolio-summary">
                <div class="summary-card glass">
                    <h3>Total Value</h3>
                    <div class="value" id="total-value">₹0.00</div>
                </div>
                <div class="summary-card glass">
                    <h3>Day's P&L</h3> <!-- Actually Total P&L for now -->
                    <div class="value" id="total-pnl">₹0.00</div>
                </div>
                <div class="summary-card glass">
                    <h3>Cash Balance</h3>
                    <div class="value" id="cash-balance" style="color: var(--accent-green);">₹0.00</div>
                    <div style="margin-top: 10px; display: flex; gap: 10px;">
                        <button class="btn-secondary" onclick="manageFunds('deposit')"
                            style="padding: 5px 10px; font-size: 0.8rem; flex: 1;">+ Add</button>
                        <button class="btn-secondary" onclick="manageFunds('withdraw')"
                            style="padding: 5px 10px; font-size: 0.8rem; flex: 1;">- Withdraw</button>
                    </div>
                </div>
                <div class="summary-card glass">
                    <h3>Invested</h3>
                    <div class="value" id="total-invested">₹0.00</div>
                </div>
                <div class="summary-card glass">
                    <h3>Total Port. Value</h3>
                    <div class="value" id="total-combined-value">₹0.00</div>
                </div>
            </div>

            <!-- Holdings Table -->
            <div class="holdings-section glass" style="margin-top: 20px; padding: 20px;">
                <h2>Current Holdings</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Qty</th>
                            <th>Avg Price</th>
                            <th>LTP</th>
                            <th>Cur. Value</th>
                            <th>P&L</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="portfolio-table-body">
                        <!-- JS Injected -->
                    </tbody>
                </table>
            </div>

            <!-- Add Modal -->
            <div id="add-modal" class="modal">
                <div class="modal-content glass" style="max-width: 400px;">
                    <span class="close-modal close-btn">&times;</span>
                    <h2>Add Holding</h2>
                    <div class="form-group">
                        <label>Stock Symbol</label>
                        <input type="text" id="p-symbol" list="stock-list" placeholder="e.g. RELIANCE.NS">
                        <datalist id="stock-list"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="p-qty" placeholder="10">
                    </div>
                    <div class="form-group">
                        <label>Avg. Buy Price</label>
                        <input type="number" id="p-price" placeholder="2400.50">
                    </div>
                    <button class="btn-primary" id="save-holding-btn" style="width: 100%; margin-top: 10px;">Save
                        Holding</button>
                </div>
            </div>

            <script src="{{ url_for('static', filename='portfolio.js') }}?v=15"></script>
        </main>
    </div>
</body>

</html>
